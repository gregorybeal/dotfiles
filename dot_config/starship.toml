# ~/.config/starship.toml
# Minimal: shell, directory, SSH host (when remote), arrow on line 2.

format = """
$shell\
$directory\
$hostname
$character"""

command_timeout = 500
add_newline = true

[shell]
disabled = false
format = "[$indicator]($style) "
style = "bold cyan"
bash_indicator = "bash"
zsh_indicator = "zsh"
powershell_indicator = "pwsh"
fish_indicator = "fish"
unknown_indicator = "sh"

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "…/"
home_symbol = "~"
read_only = " [RO]"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "

[hostname]
ssh_only = true
ssh_symbol = "🌐 "
format = "[$ssh_symbol$hostname]($style) "
style = "bold yellow"
trim_at = "."

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[V](bold yellow)"

# Disable everything else
