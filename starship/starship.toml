# ~/.config/starship.toml
# Tailored for IT infrastructure work: Ansible, SSH, registers, jump boxes,
# Python tooling, lots of git, multiple tmux panes across hosts.
#
# Plain-text safe: works without Nerd Fonts. Symbols upgrade automatically
# if you have one installed (set via terminal font, no config change needed).

# ─────────────────────────────────────────────────────────────
#  PROMPT STRUCTURE
# ─────────────────────────────────────────────────────────────

# Two-line prompt:
#   Line 1: [host-or-context] dir (git-branch [status]) [python-venv] [duration]   [time]
#   Line 2: ❯  (red on error, green on success)
format = """
$shlvl\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$cmd_duration\
$jobs\
$status\
$line_break\
$character"""

right_format = """$time"""

# Don't block the prompt on slow modules (e.g. git status in huge repos)
command_timeout = 500

# Blank line before each new prompt — easier to scan history
add_newline = true

# ─────────────────────────────────────────────────────────────
#  PROMPT CHARACTER (the arrow)
# ─────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[V](bold yellow)"

# ─────────────────────────────────────────────────────────────
#  HOST IDENTITY — critical when working across many machines
# ─────────────────────────────────────────────────────────────

# Username: only show when relevant (root, or non-default user)
[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"

# Hostname: show prominently when SSH'd. Color-coded for quick recognition:
#   - Production-ish (registers/jumpbox): yellow background
#   - Local: hidden
# Override colors per-machine in ~/.gitconfig.local style by editing TOML directly,
# or use the [hostname] aliases via SSH config.
[hostname]
ssh_only = true
ssh_symbol = "🌐 "
format = "[$ssh_symbol$hostname]($style) "
style = "bold bg:#f9e2af fg:#1e1e2e"   # bg highlight makes SSH context unmissable
trim_at = "."                          # cut domain suffix: reg-1234.store.corp -> reg-1234

# Shell level: shows when you've nested shells (e.g. ssh inside ssh inside tmux)
# Useful for noticing when you're 3 deep and getting confused
[shlvl]
disabled = false
threshold = 2
symbol = "↕ "
style = "bold cyan"
format = "[$symbol$shlvl]($style) "
repeat = false

# ─────────────────────────────────────────────────────────────
#  DIRECTORY — where you are matters
# ─────────────────────────────────────────────────────────────

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true            # inside a git repo, show repo-relative path
truncation_symbol = "…/"
home_symbol = "~"
read_only = " [RO]"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "

# Substitutions for paths you visit a lot — keep prompt short and meaningful
[directory.substitutions]
"code/personal" = "📁personal"
"code/work" = "📁work"
".config/reg-tool" = "⚙reg-tool"

# ─────────────────────────────────────────────────────────────
#  GIT — the most active context for any dev/ops work
# ─────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "
truncation_length = 30
truncation_symbol = "…"

# Status indicators — designed to be readable as a quick glance:
#   + N   = N staged changes
#   ! N   = N unstaged changes
#   ? N   = N untracked
#   ⇡ N   = N commits ahead of remote
#   ⇣ N   = N commits behind
[git_status]
format = '([\[$all_status$ahead_behind\]]($style)) '
style = "bold red"
conflicted = "≠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Show "MERGING" / "REBASING" status when relevant — saves "oh right, I was in the middle of something"
[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
style = "bold yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

# ─────────────────────────────────────────────────────────────
#  PYTHON — relevant for reg_update and tooling work
# ─────────────────────────────────────────────────────────────

[python]
symbol = "py "
format = '[${symbol}(\($virtualenv\) )]($style)'
style = "yellow"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", "setup.py", ".python-version"]
detect_folders = [".venv", "venv"]
python_binary = ["python3", "python"]
pyenv_version_name = false
version_format = "v${raw}"

# ─────────────────────────────────────────────────────────────
#  COMMAND METADATA — performance + state hints
# ─────────────────────────────────────────────────────────────

# How long did the last command take? Only show if it took ≥3 seconds.
# Critical for Ansible runs, log greps across many files, slow SSH commands.
[cmd_duration]
min_time = 3000        # 3 seconds
format = "took [$duration]($style) "
style = "yellow"
show_milliseconds = false
show_notifications = false

# Background jobs indicator — see at a glance if you have suspended/backgrounded work
[jobs]
symbol = "⚙ "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

# Last exit code — visible reminder when something failed
[status]
disabled = false
format = '[\[$status\]]($style) '
style = "bold red"
symbol = "✗"
success_symbol = ""    # don't show on success (avoid noise)
recognize_signal_code = true
map_symbol = true
pipestatus = true      # show all exit codes when piping commands

# ─────────────────────────────────────────────────────────────
#  TIME — on the right side
# ─────────────────────────────────────────────────────────────

[time]
disabled = false
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M"
utc_time_offset = "local"

# ─────────────────────────────────────────────────────────────
#  DISABLED MODULES — keep the prompt fast and uncluttered
# ─────────────────────────────────────────────────────────────

# Cloud / orchestration — not in your daily flow
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[kubernetes]
disabled = true
[docker_context]
disabled = true
[terraform]
disabled = true

# Other languages — not your stack
[nodejs]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[ruby]
disabled = true
[php]
disabled = true
[dotnet]
disabled = true
[c]
disabled = true

# Misc noise reducers
[package]
disabled = true        # hide package.json/pyproject version display
[memory_usage]
disabled = true
[battery]
disabled = true        # uncomment to enable on laptops if you want it
[localip]
disabled = true
