# ~/.tmux.conf — managed by dotfiles repo
# Works on real tmux (Mac/Linux) and psmux (Windows)

# ---------- Prefix ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------- General ----------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# 256 color and true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---------- Splits ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- Window management ----------
bind c new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window

# ---------- Reload ----------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---------- Copy mode (vi-style) ----------
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------- Status bar ----------
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#cdd6f4]| "
set -g status-right "#[fg=#cdd6f4]%a %d-%b #[fg=#89b4fa,bold]%H:%M "

setw -g window-status-current-style "fg=#1e1e2e bg=#89b4fa bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ---------- Plugins (TPM — Mac/Linux only, psmux has its own plugin system) ----------
# To install: prefix + I after first session start
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep last). Only loads if TPM is installed.
if-shell "test -f ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'"
