# ~/.tmux.conf — stowed from ~/dotfiles/tmux

# ---------- Prefix ----------
unbind C-b
set -g prefix `
bind ` send-prefix

# ---------- General ----------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---------- Splits ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- Window management ----------
bind c new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window

# ---------- Reload ----------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---------- Copy mode (vi-style) ----------
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# OS-aware clipboard
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "uname | grep -q Linux && command -v clip.exe" {
    bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"
}
if-shell "uname | grep -q Linux && command -v xclip && ! command -v clip.exe" {
    bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
}

# OSC 52 clipboard passthrough (Ghostty, iTerm2, etc.)
set -g set-clipboard on

# ============================================================
# PLUGIN OPTIONS (must appear before 'run tpm')
# ============================================================

# tmux-resurrect / tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-yank
set -g @yank_action 'copy-pipe'
set -g @yank_selection_mouse 'clipboard'

# tmux-menus
set -g @menus_trigger 'm'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'

# tmux-prefix-highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg '#f9e2af'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=#a6e3a1,bold'
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=#f38ba8,bold'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_empty_has_affixes 'off'

# ---------- Status bar (Catppuccin Mocha) ----------
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# tmux-prefix-highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg '#f9e2af'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=#a6e3a1,bold'
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=#f38ba8,bold'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_empty_has_affixes 'off'
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ============================================================
# PLUGINS
# Install: prefix + I  |  Update: prefix + U  |  Remove: prefix + alt+u
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-fzf'

# Initialize TPM (keep last)
if-shell "test -f ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'"
