# ~/.tmux.conf — managed by dotfiles repo
# Works on real tmux (Mac/Linux) and psmux (Windows)

# ---------- Prefix ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------- General ----------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# 256 color and true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---------- Splits ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- Window management ----------
bind c new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window

# ---------- Reload ----------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---------- Copy mode (vi-style) ----------
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================================
# PLUGIN CONFIGURATION
# Plugin options MUST be set BEFORE the 'run ~/.tmux/plugins/tpm/tpm'
# line at the bottom of this file, or they won't take effect.
# ============================================================

# ---------- tmux-resurrect / tmux-continuum ----------
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'        # auto-save every 15 min
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'    # restore vim sessions if any
set -g @resurrect-strategy-nvim 'session'

# ---------- tmux-yank ----------
# Don't exit copy mode after yank (so you can keep selecting)
set -g @yank_action 'copy-pipe'
# Yank to system clipboard automatically
set -g @yank_selection_mouse 'clipboard'

# ---------- tmux-menus ----------
# Default trigger is prefix + \ which is awkward; remap to prefix + m
set -g @menus_trigger 'm'
# Use a sensible location (centered)
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'
# Don't ask for confirmation on destructive actions in menus (faster workflow)
set -g @menus_without_prefix 0

# ---------- tmux-prefix-highlight ----------
# Show indicator when prefix is active or you're in copy mode
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg '#f9e2af'        # yellow when prefix is pressed
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=#a6e3a1,bold'  # green in copy mode
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=#f38ba8,bold'  # red in sync mode
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_empty_has_affixes 'off'

# ---------- tome (Vim/Neovim playbook integration) ----------
# Default keys are prefix+p (playbook) and prefix+P (scratchpad).
# prefix+p collides with the default 'previous-window' binding, so remap:
set -g @tome_key 'o'              # prefix + o opens playbook
set -g @tome_scratch_key 'O'      # prefix + O opens scratchpad
# Default orientation when splitting for the playbook
set -g @tome_split 'h'            # horizontal split (vim above, REPL below)
set -g @tome_split_size '15'      # vim pane is 15 lines tall

# ---------- Status bar ----------
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 100

# Status left: session name
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#cdd6f4]| "

# Status right: prefix indicator, date, time
# #{prefix_highlight} is the magic insertion point for the plugin
set -g status-right "#{prefix_highlight} #[fg=#cdd6f4]%a %d-%b #[fg=#89b4fa,bold]%H:%M "

setw -g window-status-current-style "fg=#1e1e2e bg=#89b4fa bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ============================================================
# PLUGIN LIST (TPM)
# To install plugins: prefix + I  (capital I) after first tmux start
# To update plugins:  prefix + U
# To remove plugins:  remove the line, then prefix + alt + u
# ============================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'laktak/tome'

# Initialize TPM (keep last). Only loads if TPM is installed.
if-shell "test -f ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'"

# ── Plugins (managed by tmuxpanel) ──────────────────────
set -g @plugin 'psmux-plugins/psmux-resurrect'
run-shell 'C:\Users\gbeal\.tmux\plugins/psmux-resurrect/psmux-resurrect.tmux'
set -g @plugin 'psmux-plugins/ppm'
run-shell 'C:\Users\gbeal\.tmux\plugins/ppm/ppm.tmux'
set -g @plugin 'psmux-plugins/psmux-prefix-highlight'
run-shell 'C:\Users\gbeal\.tmux\plugins/psmux-prefix-highlight/psmux-prefix-highlight.tmux'
set -g @plugin 'psmux-plugins/psmux-continuum'
run-shell 'C:\Users\gbeal\.tmux\plugins/psmux-continuum/psmux-continuum.tmux'
set -g @plugin 'psmux-plugins/psmux-sensible'
run-shell 'C:\Users\gbeal\.tmux\plugins/psmux-sensible/psmux-sensible.tmux'
# ── End plugins ──────────────────────────────────────
