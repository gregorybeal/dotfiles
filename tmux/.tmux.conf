# ~/.tmux.conf — stowed from ~/dotfiles/tmux

# ---------- Prefix ----------
unbind C-b
set -g prefix `
bind ` send-prefix

# ---------- General ----------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
# tmux-256color is the correct inner TERM for a modern true-color terminal
# (Ghostty); the override tells tmux the OUTER terminal handles 24-bit color.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# Advertise 24-bit colour as a terminal feature too (belt-and-suspenders with Tc).
set -as terminal-features ",xterm-256color:RGB"
# Undercurl + coloured underlines so nvim diagnostics/spell render through tmux.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Let programs pass escape sequences straight through tmux — needed for Ghostty/
# Kitty graphics (image previews in nvim/TUIs) and similar passthrough tools.
set -gq allow-passthrough on

# ---------- Splits ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle synchronized input across all panes (status bar shows "Sync" when on)
bind S set synchronize-panes \; display "sync-panes: #{?synchronize-panes,on,off}"

# ---------- Window management ----------
bind c new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window

# ---------- Popups ----------
# Floating scratch shell in the current pane's directory (closes on exit)
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# sesh session picker (prefix+T): fzf over zoxide dirs + live sessions, jump to
# or create a project session. Needs `sesh` (brew) + fzf.
bind T display-popup -E -w 60% -h 60% 'sesh connect "$(sesh list --icons | fzf --reverse --prompt "sesh> ")"'

# ---------- Reload ----------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---------- Copy mode (vi-style) ----------
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# OS-aware clipboard
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "uname | grep -q Linux && command -v clip.exe" {
    bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"
}
if-shell "uname | grep -q Linux && command -v xclip && ! command -v clip.exe" {
    bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
}

# OSC 52 clipboard passthrough (Ghostty, iTerm2, etc.)
set -g set-clipboard on

# ============================================================
# PLUGIN OPTIONS (must appear before 'run tpm')
# ============================================================

# tmux-resurrect / tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-yank
set -g @yank_action 'copy-pipe'
set -g @yank_selection_mouse 'clipboard'

# tmux-menus
set -g @menus_trigger 'm'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'

# tmux-prefix-highlight — the modifier/prefix indicator.
# NOTE: this only renders where the literal string "#{prefix_highlight}"
# appears in status-left/right (see the Status bar section). The plugin
# substitutes that placeholder at load time; without it, nothing shows.
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg '#f9e2af'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=#a6e3a1,bold'
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=#f38ba8,bold'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_empty_has_affixes 'off'

# extrakto — prefix+Tab: fuzzy-grab paths/URLs/words off the screen (needs fzf)
set -g @extrakto_key 'tab'
set -g @extrakto_clip_tool 'tmux'         # copy via tmux buffer -> OSC52 (works over SSH)
set -g @extrakto_fzf_tool 'fzf'

# tmux-fzf-url — prefix+u: fzf over URLs visible in the pane, open in browser
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'

# tmux-floax — prefix+f: persistent floating scratch pane (remapped off the
# default 'p' so it doesn't clobber previous-window)
set -g @floax-bind 'f'
set -g @floax-bind-menu 'C-f'             # floax menu; kept off 'P' (1Password) and 'F' (tmux-fzf)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#89b4fa'

# tmux-1password — prefix+P: fuzzy-pick a 1Password item and paste it (needs the
# `op` CLI — installed on Mac via the 1password-cli cask). Remapped off the
# default 'u' to avoid colliding with tmux-fzf-url.
set -g @1password-key 'P'

# ---------- Pane appearance ----------
# Make each pane distinct: a heavier border, a coloured active border, a
# per-pane title bar (the closest tmux gets to a "box" around a pane), and a
# dimmed background on inactive panes.
#
# Catppuccin unconditionally sets pane-border-style / pane-active-border-style
# from these variables when it loads, so the border COLOURS must be set here
# (setting pane-active-border-style directly would be overwritten by the plugin).
set -g @catppuccin_pane_border_style        'fg=#585b70'   # surface2 — calm grey between inactive panes
set -g @catppuccin_pane_active_border_style 'fg=#89b4fa'   # blue — marks the active pane

# Per-pane title bar along the top border — this carries the visual weight of
# distinguishing panes (line-drawing weight renders inconsistently across fonts).
# We take over the format ourselves (Catppuccin's pane title can't style the
# active vs inactive bars differently — it colours them all the same). The
# active pane gets a bold crust-on-blue label; inactive panes get a muted label.
set -g @catppuccin_pane_status_enabled 'no'
set -g pane-border-status top
set -g pane-border-format "#[align=left]#{?pane_active,#[fg=#11111b#,bg=#89b4fa#,bold] #{pane_index} #{pane_current_command} #[default],#[fg=#7f849c#,bg=#313244] #{pane_index} #{pane_current_command} #[default]}"

# Plain single-line glyphs for the remaining borders — the title bar above does
# the heavy lifting, so the lines just need to be present and clean.
set -g pane-border-lines single

# Dim inactive panes so the active one stands out. Catppuccin doesn't touch
# these, so they're safe to set directly. NOTE: this only affects areas a
# program doesn't paint itself — shell panes dim, but full-screen TUIs
# (nvim, htop, …) draw their own background and will override it.
set -g window-style        'bg=#11111b'   # inactive panes: crust (clearly dimmer)
set -g window-active-style 'bg=#1e1e2e'   # active pane: base (normal)

# ---------- Status bar (Catppuccin Mocha) ----------
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100

# Catppuccin must be loaded HERE — before status-left/right — so its
# @catppuccin_status_* variables exist when the module lines below expand.
# (It's still listed as a TPM @plugin further down for install/updates; loading
# it explicitly here is the documented pattern for TPM users. tmux-cpu/battery/
# prefix-highlight then run at 'run tpm' and substitute their live values into
# the status line built here.)
if-shell "test -f ~/.tmux/plugins/tmux/catppuccin.tmux" "run '~/.tmux/plugins/tmux/catppuccin.tmux'"

# Prefix/copy/sync indicator on the left. tmux-prefix-highlight replaces this
# literal placeholder when it loads at 'run tpm'.
set -g status-left "#{prefix_highlight}"

# Right side: app | cpu | ram | session | uptime | battery.
# cpu/ram/battery use -agF so the module expands to text containing
# #{cpu_percentage}/#{battery_percentage}, which tmux-cpu/battery then swap for
# their live scripts during 'run tpm'.
set -g  status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag  status-right "#{E:@catppuccin_status_session}"
set -ag  status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ============================================================
# PLUGINS
# Install: prefix + I  |  Update: prefix + U  |  Remove: prefix + alt+u
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'                       # prefix+Tab: fuzzy-grab screen text
set -g @plugin 'wfxr/tmux-fzf-url'                     # prefix+u: fzf over URLs
set -g @plugin 'omerxx/tmux-floax'                     # prefix+f: floating scratch pane
set -g @plugin 'yardnsm/tmux-1password'                # prefix+P: paste 1Password items (needs op)
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name' # auto nerd-font window icons

# Initialize TPM (keep last — runs tmux-cpu/battery/prefix-highlight, which
# substitute their live values into the status line built above)
if-shell "test -f ~/.tmux/plugins/tpm/tpm" "run '~/.tmux/plugins/tpm/tpm'"
